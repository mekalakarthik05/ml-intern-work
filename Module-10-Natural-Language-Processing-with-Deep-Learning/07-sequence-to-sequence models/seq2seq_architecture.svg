<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="980" height="460" fill="#ffffff"/>

  <text x="490" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Sequence-to-Sequence with Attention — Architecture Flow</text>

  <!-- Encoder input tokens -->
  <text x="120" y="70" font-size="13" fill="#555">Input Sequence (Encoder)</text>
  <g>
    <rect x="40" y="85" width="60" height="36" rx="6" fill="#dbe9ff" stroke="#4C72B0"/>
    <text x="70" y="107" text-anchor="middle" font-size="13">x1</text>
    <rect x="115" y="85" width="60" height="36" rx="6" fill="#dbe9ff" stroke="#4C72B0"/>
    <text x="145" y="107" text-anchor="middle" font-size="13">x2</text>
    <rect x="190" y="85" width="60" height="36" rx="6" fill="#dbe9ff" stroke="#4C72B0"/>
    <text x="220" y="107" text-anchor="middle" font-size="13">x3</text>
  </g>

  <!-- Encoder hidden states -->
  <text x="145" y="150" text-anchor="middle" font-size="13" fill="#555">Encoder Hidden States</text>
  <g>
    <circle cx="70" cy="180" r="22" fill="#4C72B0"/>
    <text x="70" y="185" text-anchor="middle" font-size="12" fill="white">h1</text>
    <circle cx="145" cy="180" r="22" fill="#4C72B0"/>
    <text x="145" y="185" text-anchor="middle" font-size="12" fill="white">h2</text>
    <circle cx="220" cy="180" r="22" fill="#4C72B0"/>
    <text x="220" y="185" text-anchor="middle" font-size="12" fill="white">h3</text>
  </g>
  <line x1="70" y1="121" x2="70" y2="158" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="145" y1="121" x2="145" y2="158" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="220" y1="121" x2="220" y2="158" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="92" y1="180" x2="123" y2="180" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="167" y1="180" x2="198" y2="180" stroke="#888" marker-end="url(#arrow)"/>

  <!-- Attention block -->
  <rect x="380" y="150" width="220" height="90" rx="10" fill="#fff3cd" stroke="#e0a800" stroke-width="2"/>
  <text x="490" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a4400">Attention</text>
  <text x="490" y="198" text-anchor="middle" font-size="11" fill="#5a4400">scores e_t,i = score(s_t-1, h_i)</text>
  <text x="490" y="215" text-anchor="middle" font-size="11" fill="#5a4400">weights α via softmax</text>
  <text x="490" y="232" text-anchor="middle" font-size="11" fill="#5a4400">context c_t = Σ α·h_i</text>

  <!-- arrows from encoder states to attention -->
  <line x1="242" y1="180" x2="378" y2="190" stroke="#999" marker-end="url(#arrow)"/>

  <!-- Decoder hidden states / outputs -->
  <text x="780" y="150" text-anchor="middle" font-size="13" fill="#555">Decoder Hidden States</text>
  <circle cx="700" cy="195" r="22" fill="#DD8452"/>
  <text x="700" y="200" text-anchor="middle" font-size="12" fill="white">s1</text>
  <circle cx="780" cy="195" r="22" fill="#DD8452"/>
  <text x="780" y="200" text-anchor="middle" font-size="12" fill="white">s2</text>
  <circle cx="860" cy="195" r="22" fill="#DD8452"/>
  <text x="860" y="200" text-anchor="middle" font-size="12" fill="white">s3</text>
  <line x1="722" y1="195" x2="753" y2="195" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="802" y1="195" x2="833" y2="195" stroke="#888" marker-end="url(#arrow)"/>

  <!-- context vector feeding into decoder -->
  <line x1="600" y1="195" x2="673" y2="195" stroke="#e0a800" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="638" y="185" text-anchor="middle" font-size="10" fill="#5a4400">c_t</text>

  <!-- Decoder outputs -->
  <text x="780" y="70" font-size="13" fill="#555">Output Sequence (Decoder)</text>
  <rect x="670" y="85" width="60" height="36" rx="6" fill="#ffe0cc" stroke="#DD8452"/>
  <text x="700" y="107" text-anchor="middle" font-size="13">y1</text>
  <rect x="750" y="85" width="60" height="36" rx="6" fill="#ffe0cc" stroke="#DD8452"/>
  <text x="780" y="107" text-anchor="middle" font-size="13">y2</text>
  <rect x="830" y="85" width="60" height="36" rx="6" fill="#ffe0cc" stroke="#DD8452"/>
  <text x="860" y="107" text-anchor="middle" font-size="13">y3</text>
  <line x1="700" y1="173" x2="700" y2="123" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="780" y1="173" x2="780" y2="123" stroke="#888" marker-end="url(#arrow)"/>
  <line x1="860" y1="173" x2="860" y2="123" stroke="#888" marker-end="url(#arrow)"/>

  <!-- autoregressive feedback -->
  <path d="M700,121 C700,260 780,260 780,173" fill="none" stroke="#aaa" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="740" y="280" text-anchor="middle" font-size="10" fill="#777">previous output fed back in (autoregressive)</text>

  <!-- Legend -->
  <rect x="40" y="340" width="900" height="100" rx="8" fill="#f7f7f9" stroke="#ddd"/>
  <text x="60" y="365" font-size="13" font-weight="bold" fill="#333">Flow Summary:</text>
  <text x="60" y="388" font-size="12" fill="#444">1. Encoder reads input tokens (x1..xS) and produces a hidden state per position (h1..hS).</text>
  <text x="60" y="408" font-size="12" fill="#444">2. At each decoding step, attention computes a weighted context (c_t) over ALL encoder states — not just the last one.</text>
  <text x="60" y="428" font-size="12" fill="#444">3. Decoder combines its own hidden state (s_t) with c_t to produce the next output token (y_t), then feeds y_t back in.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
